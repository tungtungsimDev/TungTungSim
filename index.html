<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tung Tung Simulator</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      border: 1px solid #000;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "Title Screen";
let shopState = "Tylenol";
let catcherActive = "No";

const fontLarge = "70px 'Franklin Gothic', sans-serif";
const fontMedium = "40px 'Franklin Gothic', sans-serif";

function loadImage(src) {
  const img = new Image();
  img.src = src;
  return img;
}

const Assets = {
  titleBackground: loadImage("Assets/tungtung.jpeg"),
  gameBackground: loadImage("Assets/gameBackground.jpg"),
  logo: loadImage("Assets/SimulatorLogo.jpg"),
  playButton: loadImage("Assets/PlayButton.jpg"),
  store: loadImage("Assets/tungStore.png"),
  catcherTung: loadImage("Assets/catcherTung.png"),
  catcherBackground: loadImage("Assets/catcherBackground.jpg"),
  eagle: loadImage("Assets/eagle.jpg"),
  angelTung: loadImage("Assets/angelTung.png"),
  storeBackground: loadImage("Assets/shopBackground.jpg"),
  exitButton: loadImage("Assets/exitButton.jpg"),
  tylenolPicture: loadImage("Assets/tungTylenol.png"),
  buyButton: loadImage("Assets/buyButton.jpg"),
  catcher: loadImage("Assets/catcher.png"),
  rightArrow: loadImage("Assets/rightArrow.jpg"),
  leftArrow: loadImage("Assets/leftArrow.jpg")
};

// Rect helpers
function makeRect(x, y, w, h) {
  return { x, y, w, h };
}
function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

// Button rects (match Pygame positions)
const buttonRect = makeRect(550, 250, 0, 0); // width/height set after image load
const storeRect = makeRect(50, 75, 0, 0);
const exitRect = makeRect(900, 30, 0, 0);
const buyRect = makeRect(775, 250, 0, 0);
const leftRect = makeRect(132, 490, 0, 0);
const rightRect = makeRect(800, 490, 0, 0);

// Player state
const Player = {
  sprite: loadImage("Assets/BuffTung.png"),
  liftingSprite: loadImage("Assets/buffLift.png"),
  midLiftingSprite: loadImage("Assets/midLift.png"),
  isLifting: false,
  liftTimer: 0,
  liftDuration: 450,
  strength: 0,
  tylenol: 0,
  tylenolOwned: false,
  angels: 0
};

let lastAngelTickGame = 0;
let lastAngelTickShop = 0;

// Once images load, set rect sizes
Assets.playButton.onload = () => {
  buttonRect.w = Assets.playButton.width;
  buttonRect.h = Assets.playButton.height;
};
Assets.store.onload = () => {
  storeRect.w = Assets.store.width;
  storeRect.h = Assets.store.height;
};
Assets.exitButton.onload = () => {
  exitRect.w = Assets.exitButton.width;
  exitRect.h = Assets.exitButton.height;
};
Assets.buyButton.onload = () => {
  buyRect.w = Assets.buyButton.width;
  buyRect.h = Assets.buyButton.height;
};
Assets.leftArrow.onload = () => {
  leftRect.w = Assets.leftArrow.width;
  leftRect.h = Assets.leftArrow.height;
};
Assets.rightArrow.onload = () => {
  rightRect.w = Assets.rightArrow.width;
  rightRect.h = Assets.rightArrow.height;
};

function drawTitleScreen() {
  ctx.drawImage(Assets.titleBackground, 0, 0, 1000, 600);
  ctx.drawImage(Assets.logo, 100, 100, 400, 400);
  ctx.drawImage(Assets.playButton, 550, 250);
}

function drawStrengthText() {
  ctx.font = fontLarge;
  ctx.fillStyle = "black";
  ctx.fillText("Strength: " + Player.strength, 350, 80);
}

function startGameScreen(timestamp) {
  ctx.drawImage(Assets.gameBackground, 0, 0, 1000, 600);

  const scaledWidth = 400;
  const scaledHeight = 400;
  const x = 550;
  const y = 100;

  if (Player.isLifting) {
    const elapsed = timestamp - Player.liftTimer;
    const phase1 = Player.liftDuration / 3;
    const phase2 = 2 * Player.liftDuration / 3;

    if (elapsed < phase1) {
      ctx.drawImage(Player.midLiftingSprite, x, y, 385, 410);
    } else if (elapsed < phase2) {
      ctx.drawImage(Player.liftingSprite, x, y, scaledWidth, scaledHeight);
    } else {
      ctx.drawImage(Player.sprite, x, y, scaledWidth, scaledHeight);
      Player.isLifting = false;
    }
  } else {
    ctx.drawImage(Player.sprite, x, y, scaledWidth, scaledHeight);
  }

  drawStrengthText();
  ctx.drawImage(Assets.store, 50, 75, 300, 300);

  if (Player.tylenolOwned) {
    ctx.drawImage(Assets.tylenolPicture, 520, 480, 100, 100);
  }
  if (Player.angels >= 1) {
    ctx.drawImage(Assets.angelTung, 530, 340, 100, 150);
  }

  // Angel passive strength gain (every ~100ms)
  if (Player.angels >= 1) {
    if (!lastAngelTickGame) lastAngelTickGame = timestamp;
    if (timestamp - lastAngelTickGame >= 100) {
      Player.strength += Math.floor(1 + 0.5 * Player.angels);
      lastAngelTickGame = timestamp;
    }
  }
}

function startShopScreen(timestamp) {
  ctx.drawImage(Assets.storeBackground, 0, 0, 1000, 600);

  ctx.font = fontMedium;
  ctx.fillStyle = "white";
  ctx.fillText(Player.strength.toString(), 90, 80);

  ctx.drawImage(Assets.exitButton, 900, 30);
  ctx.drawImage(Assets.buyButton, 775, 250, 200, 100);
  ctx.drawImage(Assets.rightArrow, 800, 490, 70, 70);
  ctx.drawImage(Assets.leftArrow, 132, 490, 70, 70);

  // Angel passive strength gain in shop (if catcher not active)
  if (Player.angels >= 1 && catcherActive !== "Yes") {
    if (!lastAngelTickShop) lastAngelTickShop = timestamp;
    if (timestamp - lastAngelTickShop >= 100) {
      Player.strength += Math.floor(1 + 0.5 * Player.angels);
      lastAngelTickShop = timestamp;
    }
  }

  let cost = 0;
  let item = "";
  let ownedText = "";
  let img = null;

  if (shopState === "Tylenol") {
    cost = 5 + Player.tylenol * (Player.tylenol + 5);
    item = "Tylenol";
    ownedText = "Owned: " + Player.tylenol;
    img = Assets.tylenolPicture;
  } else if (shopState === "Catcher") {
    cost = 5000;
    item = "Catcher in the Rye";
    ownedText = "Owned: " + catcherActive;
    img = Assets.catcher;
  } else if (shopState === "Angel") {
    cost = 100 + 100 * Player.angels;
    item = "Angel Sahur";
    ownedText = "Owned: " + Player.angels;
    img = Assets.angelTung;
  }

  ctx.fillStyle = "white";
  ctx.fillText("Cost: " + cost, 435, 155);

  if (img) {
    ctx.drawImage(img, 425, 150, 150, 150);
  }

  ctx.fillStyle = "black";
  ctx.fillText(item, shopState === "Angel" ? 415 : (shopState === "Catcher" ? 376 : 451), 570);

  ctx.fillStyle = "white";
  ctx.fillText(ownedText, 375, 450);

  if (catcherActive === "Yes") {
    Player.strength = 0;
  }
}

function startCatcherScreen() {
  ctx.drawImage(Assets.catcherBackground, 0, 0, 1000, 600);
  ctx.drawImage(Assets.catcherTung, 550, 100, 400, 400);
  ctx.drawImage(Assets.catcher, 50, 75, 300, 300);
}

function lift(timestamp) {
  if (gameState === "Start") {
    Player.isLifting = true;
    Player.liftTimer = timestamp;
    const x = 1 + Player.tylenol;
    Player.strength += x;
  }
}

// Input handling
canvas.addEventListener("mousedown", (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (gameState === "Title Screen" && pointInRect(mx, my, buttonRect)) {
    gameState = "Start";
  } else if (gameState === "Start" && pointInRect(mx, my, storeRect)) {
    gameState = "Shop";
  } else if (gameState === "Shop" && pointInRect(mx, my, exitRect)) {
    if (catcherActive === "Yes") {
      gameState = "Catcher";
    } else {
      gameState = "Start";
    }
  } else if (gameState === "Shop" && pointInRect(mx, my, buyRect)) {
    if (shopState === "Tylenol") {
      const cost = 5 + Player.tylenol * (Player.tylenol + 5);
      if (Player.strength >= cost) {
        Player.strength -= cost;
        Player.tylenol += 1;
        Player.tylenolOwned = true;
      }
    } else if (shopState === "Catcher") {
      const cost = 5000;
      if (Player.strength >= cost) {
        Player.strength -= cost;
        catcherActive = "Yes";
      }
    } else if (shopState === "Angel") {
      const cost = 100 + 100 * Player.angels;
      if (Player.strength >= cost) {
        Player.strength -= cost;
        Player.angels += 1;
      }
    }
  } else if (gameState === "Shop" && pointInRect(mx, my, rightRect)) {
    if (shopState === "Tylenol") shopState = "Angel";
    else if (shopState === "Angel") shopState = "Catcher";
    else if (shopState === "Catcher") shopState = "Tylenol";
  } else if (gameState === "Shop" && pointInRect(mx, my, leftRect)) {
    if (shopState === "Catcher") shopState = "Angel";
    else if (shopState === "Angel") shopState = "Tylenol";
    else if (shopState === "Tylenol") shopState = "Catcher";
  }
});

window.addEventListener("keydown", (e) => {
  if (gameState === "Start" && e.code === "Space") {
    lift(performance.now());
  }
});

// Main loop
function gameLoop(timestamp) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameState === "Title Screen") {
    drawTitleScreen();
  } else if (gameState === "Start") {
    startGameScreen(timestamp);
  } else if (gameState === "Shop") {
    startShopScreen(timestamp);
  } else if (gameState === "Catcher") {
    startCatcherScreen();
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
